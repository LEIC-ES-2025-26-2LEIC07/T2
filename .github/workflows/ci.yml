name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Run static analysis
        run: flutter analyze

      - name: Run widget tests with coverage
        run: flutter test --coverage

      - name: Publish quality summary
        run: |
          coverage=$(awk '
            /^LF:/ { lines += substr($0, 4) }
            /^LH:/ { hit += substr($0, 4) }
            END {
              if (lines > 0) {
                printf "%.2f", (hit / lines) * 100
              }
            }
          ' coverage/lcov.info)

          echo "## Quality Metrics" >> "$GITHUB_STEP_SUMMARY"
          echo "- Formatting: passed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Static analysis: passed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Widget tests: passed" >> "$GITHUB_STEP_SUMMARY"

          if [ -n "$coverage" ]; then
            echo "- Line coverage: ${coverage}%" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Line coverage: unavailable" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info
          if-no-files-found: ignore

      - name: Run app smoke test
        run: flutter test test/integration_test/app_test.dart

  web-smoke-build:
    name: Web Smoke Build
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web application
        run: flutter build web --release