name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Create .env file
        run: touch .env

      - name: Run static analysis
        run: flutter analyze

      - name: Run widget tests with coverage
        run: flutter test --coverage

      - name: Publish quality summary
        run: |
          if [ -f coverage/lcov.info ]; then
            coverage=$(awk '
              /^LF:/ { lines += substr($0, 4) }
              /^LH:/ { hit += substr($0, 4) }
              END {
                if (lines > 0) {
                  printf "%.2f", (hit / lines) * 100
                }
              }
            ' coverage/lcov.info)
          fi

          echo "## Quality Metrics" >> "$GITHUB_STEP_SUMMARY"
          echo "- Formatting: ✓" >> "$GITHUB_STEP_SUMMARY"
          echo "- Static analysis: ✓" >> "$GITHUB_STEP_SUMMARY"
          echo "- Widget tests: ✓" >> "$GITHUB_STEP_SUMMARY"

          if [ -n "$coverage" ]; then
            echo "- Line coverage: ${coverage}%" >> "$GITHUB_STEP_SUMMARY"
            if [ "$(echo "$coverage < 60" | bc -l)" = "1" ]; then
              echo "- Coverage gate: ✗ (${coverage}% < 60%)" >> "$GITHUB_STEP_SUMMARY"
              echo "Coverage ${coverage}% is below the required 60% threshold."
              exit 1
            fi
            echo "- Coverage gate: ✓" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Line coverage: unavailable" >> "$GITHUB_STEP_SUMMARY"
            echo "Coverage data unavailable — cannot verify threshold."
            exit 1
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info
          if-no-files-found: ignore

  web-smoke-build:
    name: Web Smoke Build
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push'
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env file
        run: touch .env

      - name: Build web application
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SB_PV_KEY }}
        run: |
          URL=$(echo "$SUPABASE_URL" | tr -d '\n\r')
          KEY=$(echo "$SUPABASE_KEY" | tr -d '\n\r')
          flutter build web --release --dart-define="NEXT_PUBLIC_SUPABASE_URL=$URL" --dart-define="SB_PV_KEY=$KEY"
