name: CodeQL - Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (javascript)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          # Exclude generated build output and mobile platform boilerplate.
          # Dart (lib/) is not supported by CodeQL — covered by flutter analyze in ci.yml.
          config: |
            paths-ignore:
              - android/
              - ios/
              - linux/
              - macos/
              - windows/
              - build/

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript'
